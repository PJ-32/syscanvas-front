<main class="page-content perfil-page">
  <h1 class="titulo-perfil">Configuración de Cuenta</h1>

  <div class="perfil-container">
    <section class="perfil-col perfil-col-foto">
      <div class="card card-foto">
        <h2 class="card-title">Foto de Perfil</h2>
        <div class="foto-wrapper">
          <img [src]="empleado.fotoUrl" class="foto-perfil" alt="Foto de perfil">
        </div>
        
        <div class="foto-buttons">
          <button type="button" class="btn-foto-primary" (click)="triggerSubidaFoto()">Modificar Foto</button>
          <button type="button" class="btn-foto-danger" (click)="eliminarFoto()">Eliminar Foto</button>
        </div>
        <p class="mensaje-estado-foto">{{ mensajeFoto }}</p>
      </div>
    </section>

    <section class="perfil-col perfil-col-datos">
      <div class="card card-datos">
        <h2 class="card-title">Datos Personales</h2>
        <form class="form-datos">
          
          <div class="form-row">
            <label>ID Colaborador</label>
            <input type="text" [value]="empleado.codPersona" readonly>
          </div>

          <div class="form-row">
            <label>Nombres</label>
            <input type="text" [value]="empleado.nombre" readonly>
          </div>

          <div class="form-row">
            <label>Apellidos</label>
            <input type="text" [value]="empleado.apellido" readonly>
          </div>

          <div class="form-row">
            <label>DNI</label>
            <input type="text" [value]="empleado.dni" readonly>
          </div>

          <div class="form-row">
            <label>Correo Electrónico</label>
            <input type="email" [value]="empleado.email" readonly>
          </div>

          <div class="form-row">
            <label>Celular</label>
            <input type="text" [value]="empleado.celular" readonly>
          </div>

          <div class="form-actions">
            <button type="button" class="btn btn-primary" (click)="abrirModalEdicion()">Modificar Datos</button>
            <button type="button" class="btn btn-warning" (click)="abrirModalPassword()">Cambiar Contraseña</button>
            
            @if (rolUsuario === 'JEFE') {
              <button type="button" class="btn btn-secondary" routerLink="/inicio-jefe">Volver al Inicio</button>
            } @else {
              <button type="button" class="btn btn-secondary" routerLink="/inicio-analista">Volver al Inicio</button>
            }
          </div>
        </form>
      </div>
    </section>
  </div>
</main>

<div class="modal" [class.show]="modalAbierto">
  <div class="modal-content">
    <div class="modal-header">
      <h2>✏️ Editar Datos Personales</h2>
      <button class="modal-close" (click)="cerrarModalEdicion()">×</button>
    </div>

    <form (submit)="guardarCambios($event)">
      
      <div class="form-group">
        <label>Nombres</label>
        <input name="nombre" [(ngModel)]="empleadoEdicion.nombre" type="text" class="form-control" required>
      </div>

      <div class="form-group">
        <label>Apellidos</label>
        <input name="apellido" [(ngModel)]="empleadoEdicion.apellido" type="text" class="form-control" required>
      </div>

      <div class="form-group">
        <label>DNI</label>
        <input name="dni" [(ngModel)]="empleadoEdicion.dni" type="text" class="form-control" maxlength="8" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input name="email" [(ngModel)]="empleadoEdicion.email" type="email" class="form-control">
      </div>

      <div class="form-group">
        <label>Celular</label>
        <input name="celular" [(ngModel)]="empleadoEdicion.celular" type="text" class="form-control" maxlength="9">
      </div>

      <div class="form-actions-modal">
        <button type="button" class="btn btn-secondary" (click)="cerrarModalEdicion()">Cancelar</button>
        <button type="submit" class="btn btn-primary">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>

<!-- Modal Cambiar Contraseña -->
<div class="modal" [class.show]="modalPasswordAbierto">
  <div class="modal-content">
    <div class="modal-header">
      <h2>🔒 Cambiar Contraseña</h2>
      <button class="modal-close" (click)="cerrarModalPassword()">×</button>
    </div>

    <form (submit)="guardarNuevaPassword($event)">
      
      <!-- Mensajes de Alerta -->
      @if (errorPassword) {
        <div class="alert alert-error show">{{ errorPassword }}</div>
      }
      @if (exitoPassword) {
        <div class="alert alert-success show">{{ exitoPassword }}</div>
      }

      <div class="form-group">
        <label>Contraseña Actual</label>
        <div class="input-wrapper">
          <input name="actual" [(ngModel)]="datosPassword.actual" [type]="mostrarPasswordActual ? 'text' : 'password'" class="form-control" required>
          <button type="button" class="password-toggle" (click)="togglePasswordModal('actual')">
            <i class="fa-solid" [class.fa-eye]="!mostrarPasswordActual" [class.fa-eye-slash]="mostrarPasswordActual"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Nueva Contraseña</label>
        <div class="input-wrapper">
          <input name="nueva" [(ngModel)]="datosPassword.nueva" [type]="mostrarPasswordNueva ? 'text' : 'password'" class="form-control" required>
          <button type="button" class="password-toggle" (click)="togglePasswordModal('nueva')">
            <i class="fa-solid" [class.fa-eye]="!mostrarPasswordNueva" [class.fa-eye-slash]="mostrarPasswordNueva"></i>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label>Confirmar Nueva Contraseña</label>
        <div class="input-wrapper">
          <input name="confirmacion" [(ngModel)]="datosPassword.confirmacion" [type]="mostrarPasswordConfirmar ? 'text' : 'password'" class="form-control" required>
          <button type="button" class="password-toggle" (click)="togglePasswordModal('confirmacion')">
            <i class="fa-solid" [class.fa-eye]="!mostrarPasswordConfirmar" [class.fa-eye-slash]="mostrarPasswordConfirmar"></i>
          </button>
        </div>
      </div>

      <div class="form-actions-modal">
        <button type="button" class="btn btn-secondary" (click)="cerrarModalPassword()" [disabled]="cargandoPassword">Cancelar</button>
        <button type="submit" class="btn btn-primary" [disabled]="cargandoPassword">
          {{ cargandoPassword ? 'Actualizando...' : 'Actualizar Contraseña' }}
        </button>
      </div>
    </form>
  </div>
</div>
