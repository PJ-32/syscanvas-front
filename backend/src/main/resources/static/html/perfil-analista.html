<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSCANVAS - Mi Perfil</title>
    <link rel="stylesheet" href="/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@iconify/iconify@3.1.1/dist/iconify.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body class="has-sidebar"> 
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="iconify sidebar-logo" data-icon="noto:card-index-dividers"></span>
                <div class="sidebar-title">SYSCANVAS</div>
                <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">
                    <i class="fa-solid fa-chevron-left"></i>
                </button>
            </div>

            <nav class="sidebar-menu">
                <a href="/html/inicio-analista.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-house"></i></span>
                    <span class="menu-text">Inicio</span>
                </a>

                <a href="/html/mi-progreso.html" class="menu-item">
                    <span class="menu-icon"><i class="fa-solid fa-chart-line"></i></span>
                    <span class="menu-text">Mi Progreso</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="javascript:void(0)" onclick="logout()" class="menu-item-logout">
                    <span class="menu-icon"><i class="fa-solid fa-right-from-bracket"></i></span>
                    <span class="menu-text">Cerrar Sesión</span>
                </a>
            </div>
        </aside>

    <!-- Contenido Principal -->
    <div class="main-content">
        
        <!-- Header -->
        <header>
            <div class="header-content">
                <div class="header-content-logo">
                    <span class="iconify sidebar-logo" data-icon="noto:card-index-dividers"></span>
                    <span class="header-content-title">SYSCANVAS</span>
                </div>

                <div class="user-info">
                    <img id="user-photo-topbar" class="foto-topbar" src="/uploads/default-foto.png" alt="Foto mini">
                </div>
            </div>
        </header>

        <!-- Perfil -->
        <main class="page-content perfil-page">
            <h1 class="titulo-perfil">Mi Perfil</h1>

            <div class="perfil-container">

                <!-- FOTO -->
                <section class="perfil-col perfil-col-foto">
                    <div class="card card-foto">
                        <h2 class="card-title">Foto de Perfil</h2>

                        <div class="foto-wrapper">
                            <img id="foto-perfil"
                                 src="/uploads/default-foto.png"
                                 onerror="this.src='/uploads/default-foto.png'"
                                 alt="Foto de perfil"
                                 class="foto-perfil">
                        </div>

                        <div class="foto-buttons">
                            <button type="button" id="btn-modificar-foto" class="btn-foto-primary">
                                Modificar Foto
                            </button>
                            <button type="button" id="btn-eliminar-foto" class="btn-foto-danger">
                                Eliminar Foto
                            </button>
                        </div>

                        <input type="file" id="input-foto" accept="image/*" style="display: none;">

                        <p id="mensaje-foto" class="mensaje-estado-foto"></p>
                    </div>
                </section>

                <!-- DATOS PERSONALES -->
                <section class="perfil-col perfil-col-datos">
                    <div class="card card-datos">
                        <h2 class="card-title">Datos Personales</h2>

                        <form id="form-datos-analista" class="form-datos">

                            <div class="form-row">
                                <label for="codpers">ID Colaborador</label>
                                <input type="text" id="codpers" readonly>
                            </div>

                            <div class="form-row">
                                <label for="nombre">Nombres</label>
                                <input type="text" id="nombre" readonly>
                            </div>

                            <div class="form-row">
                                <label for="apellido">Apellidos</label>
                                <input type="text" id="apellido" readonly>
                            </div>

                            <div class="form-row">
                                <label for="dni">DNI</label>
                                <input type="text" id="dni" readonly>
                            </div>

                            <div class="form-row">
                                <label for="fecNac">Fecha de Nacimiento</label>
                                <input type="date" id="fecNac" readonly>
                            </div>

                            <div class="form-row">
                                <label for="direcc">Dirección</label>
                                <input type="text" id="direcc" readonly>
                            </div>

                            <div class="form-row">
                                <label for="hobby">Hobby</label>
                                <input type="text" id="hobby" readonly>
                            </div>

                            <div class="form-row">
                                <label for="email">Correo Electrónico</label>
                                <input type="email" id="email" readonly>
                            </div>

                            <div class="form-row">
                                <label for="celular">Teléfono</label>
                                <input type="text" id="celular" readonly>
                            </div>

                            <div class="form-row">
                                <label for="password">Contraseña</label>
                                <input type="password" id="password" value="********" readonly>
                            </div>

                            <div class="form-actions">
                                <button type="button" id="btn-editar-datos" class="btn btn-primary">
                                    Modificar Datos
                                </button>
                                <button type="button" id="btn-cancelar-edicion" class="btn btn-secondary">
                                    Volver al Incio
                                </button>
                            </div>
                        </form>
                    </div>
                </section>

            </div>
        </main>
    </div>

    <!-- MODAL EDITAR DATOS -->
    <div id="modal-editar-datos" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">
                <h2>✏️ Editar Datos Personales</h2>
                <button class="modal-close" onclick="cerrarModalEditarDatos()">×</button>
            </div>

            <form id="form-editar-datos">

                <div class="form-group">
                    <label>Nombres</label>
                    <input id="edit-nombre" type="text" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Apellidos</label>
                    <input id="edit-apellido" type="text" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>DNI</label>
                    <input id="edit-dni" type="text" class="form-control" maxlength="8" required>
                </div>

                <div class="form-group">
                    <label>Fecha de Nacimiento</label>
                    <input id="edit-fecNac" type="date" class="form-control" required>
                </div>

                <div class="form-group">
                    <label>Dirección</label>
                    <input id="edit-direcc" type="text" class="form-control">
                </div>

                <div class="form-group">
                    <label>Hobby</label>
                    <input id="edit-hobby" type="text" class="form-control">
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input id="edit-email" type="email" class="form-control">
                </div>

                <div class="form-group">
                    <label>Celular</label>
                    <input id="edit-celular" type="text" class="form-control" maxlength="9">
                </div>

                <div class="flex gap-2 mt-4">
                    <button type="button" class="btn btn-secondary" onclick="cerrarModalEditarDatos()">Cancelar</button>
                    <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                </div>

            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script type="module" src="/js/perfil-analista.js"></script>
    <script src="/js/sidebar.js"></script>

</body>
</html>
